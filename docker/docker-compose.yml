# =============================================================
# PapoteCar - Docker Compose
# Services : MySQL 8.0
# Usage    : docker compose up -d
# =============================================================

services:

  # -----------------------------------------------------------
  # Base de données MySQL
  # -----------------------------------------------------------
  papotecar-db:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: papotecar-db
    restart: unless-stopped

    environment:
      MYSQL_DATABASE:      papotecar
      MYSQL_USER:          papotecar_user
      MYSQL_PASSWORD:      papotecar_pass
      MYSQL_ROOT_PASSWORD: root_secret

    ports:
      # host:container — change le port hôte si 3306 est déjà utilisé
      - "3306:3306"

    volumes:
      # Persistance des données entre les redémarrages
      - papotecar-db-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "papotecar_user", "--password=papotecar_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - papotecar-network

  # -----------------------------------------------------------
  # Application Spring Boot (Backend)
  # -----------------------------------------------------------
  papotecar-back:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    container_name: papotecar-back
    depends_on:
      papotecar-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://papotecar-db:3306/papotecar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: papotecar_user
      SPRING_DATASOURCE_PASSWORD: papotecar_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    networks:
      - papotecar-network

# -----------------------------------------------------------
# Volumes nommés
# -----------------------------------------------------------
volumes:
  papotecar-db-data:
    driver: local

# -----------------------------------------------------------
# Réseau interne
# -----------------------------------------------------------
networks:
  papotecar-network:
    driver: bridge
