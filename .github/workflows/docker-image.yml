name: Build and publish Docker image

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image repository (lowercase)
        id: set-image
        run: |
          # Make sure the repository string is lowercase because Docker tags must be lowercase
          echo "image_repo=$(echo \"${GITHUB_REPOSITORY}\" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.set-image.outputs.image_repo }}:latest
            ghcr.io/${{ steps.set-image.outputs.image_repo }}:${{ github.sha }}
