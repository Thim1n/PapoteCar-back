name: Build and push Docker images

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: JWT_SECRET=${{ secrets.JWT_SECRET }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/papotecar-back/app:latest
            ghcr.io/${{ steps.owner.outputs.name }}/papotecar-back/app:${{ github.sha }}

  build-mysql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mysql
        uses: docker/build-push-action@v6
        with:
          context: docker/mysql
          file: docker/mysql/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/papotecar-back/mysql:latest
            ghcr.io/${{ steps.owner.outputs.name }}/papotecar-back/mysql:${{ github.sha }}
