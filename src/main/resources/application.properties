spring.application.name=PapoteCar

spring.datasource.url=jdbc:mysql://localhost:3306/papotecar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris&connectionTimeZone=LOCAL&characterEncoding=UTF-8
spring.datasource.username=papotecar_user
spring.datasource.password=papotecar_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.enable-data-rest=false
springdoc.enable-hateoas=false

# Logging
logging.level.com.PapoteCar.PapoteCar.security=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

